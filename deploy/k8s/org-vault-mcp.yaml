apiVersion: apps/v1
kind: Deployment
metadata:
  name: org-vault-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org-vault-mcp
  template:
    metadata:
      labels:
        app: org-vault-mcp
    spec:
      containers:
        - name: org-vault-mcp
          image: org-syncd:latest
          imagePullPolicy: IfNotPresent
          args: ["mcp"]
          env:
            - name: COUCHDB_URL
              value: http://couchdb:5984
            - name: COUCHDB_DATABASE
              value: orgsync
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-auth
                  key: username
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-auth
                  key: password
            - name: DEVICE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
